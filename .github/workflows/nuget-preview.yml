name: Publish NuGet Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/uTPro.Feature.AuditLog/uTPro.Feature.AuditLog.csproj

      - name: Pack preview
        run: |
          dotnet pack src/uTPro.Feature.AuditLog/uTPro.Feature.AuditLog.csproj \
            -c Release \
            --no-restore \
            -p:PackageVersion=1.0.0-preview.${{ github.run_number }} \
            -o ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
